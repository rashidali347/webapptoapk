name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Get Code
        uses: actions/checkout@v4

      - name: 2. Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. Setup Gradle & Fix Missing Files
        # This official tool is much better than the "gradle wrapper" command
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5 # We use a stable version to avoid the error in your screenshot

      - name: 4. Build the App
        # We run 'gradle assembleDebug' directly instead of './gradlew'
        run: gradle assembleDebug

      - name: 5. Save the APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: app/build/outputs/apk/debug/*.apk
